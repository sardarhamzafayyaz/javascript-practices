<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stylish Profile Form + Cards</title>
  <link rel="stylesheet" href="./src/output.css">
</head>

<body class="bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100 min-h-screen">

  <!-- FORM -->
  <div class="max-w-3xl mx-auto mt-12 bg-white/80 backdrop-blur-lg p-8 rounded-2xl shadow-xl border">

    <h1 class="text-3xl font-bold text-center mb-6">Create Profile</h1>

    <form id="profileForm" class="space-y-4">

      <input
        type="text"
        id="name"
        placeholder="Name"
        required
        class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <input
        type="text"
        id="role"
        placeholder="Role"
        required
        class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400"
      />

      <textarea
        id="bio"
        placeholder="Bio"
        required
        class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400"
      ></textarea>

      <input
        type="url"
        id="photo"
        placeholder="Photo URL"
        required
        class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400"
      />

      <button
        type="submit"
        class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-3 rounded-xl font-semibold"
      >
        Submit Profile
      </button>

    </form>
  </div>

  <!-- CARDS -->
<div id="cardContainer" class="max-w-6xl mx-auto mt-14 grid md:grid-cols-3 gap-8 px-6"></div>
    <!-- Default Card 1 -->
   
  </div>

  <script src="script.js"></script>

</body>
</html>
